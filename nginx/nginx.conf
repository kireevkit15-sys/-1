worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- logging -----------------------------------------------------------
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"rt":$request_time,'
        '"upstream":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_rt":"$upstream_response_time"'
      '}';
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # --- performance -------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10M;

    # --- gzip --------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml
        application/xml+rss application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf;

    # --- rate limit zones --------------------------------------------------
    # общая зона на весь API (10 req/s на IP, burst 20)
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
    # строгая зона на /auth/login, /auth/register (5 req/min, burst 3)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    # соединения на IP
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # --- upstreams ---------------------------------------------------------
    upstream web {
        server web:3000;
        keepalive 32;
    }
    upstream api {
        server api:3001;
        keepalive 32;
    }

    # --- HTTP → HTTPS ------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS -------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name razum.app www.razum.app;

        ssl_certificate     /etc/letsencrypt/live/razum.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/razum.app/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/razum.app/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 1.0.0.1 valid=300s;
        resolver_timeout 5s;

        # connection limits
        limit_conn conn_zone 50;

        # --- security headers ---------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org https://*.sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' data:; font-src 'self' data:; connect-src 'self' wss: https://*.sentry.io https://api.telegram.org; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # --- static caching -----------------------------------------------
        location /_next/static/ {
            proxy_pass http://web;
            proxy_cache_valid 200 1y;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(?:ico|css|js|svg|png|jpg|jpeg|gif|webp|avif|woff2?)$ {
            proxy_pass http://web;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # --- auth endpoints: строгий лимит --------------------------------
        location ~ ^/api/(auth/(login|register|telegram)|invite/redeem)$ {
            limit_req zone=auth_zone burst=3 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # --- API ----------------------------------------------------------
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api;
            include /etc/nginx/conf.d/proxy_headers.conf;
            proxy_read_timeout 60s;
        }

        # --- WebSockets ---------------------------------------------------
        location /socket.io/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /battle/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        # --- frontend -----------------------------------------------------
        location / {
            proxy_pass http://web;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # healthcheck наружу не выставляем
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }
    }
}
