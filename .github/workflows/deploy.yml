name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/sha)"
        required: false
        default: "main"
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - id: meta
        name: Compute release tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.release_tag }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ steps.meta.outputs.release_tag }}
            ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            SENTRY_RELEASE=${{ steps.meta.outputs.release_tag }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://razum.app
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup SSH
        run: |
          install -d -m 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT || 22 }}" \
            "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy files
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT || 22 }}" \
            docker-compose.prod.yml nginx/ scripts/backup.sh deploy/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/srv/razum/app/"

      - name: Pull, migrate, restart
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT || 22 }}" \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              RELEASE_TAG="$RELEASE_TAG" 'bash -s' <<'EOF'
          set -euo pipefail
          cd /srv/razum/app
          export RELEASE_TAG
          echo "==> Pulling images ${RELEASE_TAG}"
          docker compose -f docker-compose.prod.yml pull api web
          echo "==> Running migrations"
          docker compose -f docker-compose.prod.yml run --rm api pnpm --filter @razum/api prisma migrate deploy
          echo "==> Restarting services"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          echo "==> Pruning old images"
          docker image prune -af --filter "until=168h"
          EOF

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://razum.app/api/health || echo 000)
            echo "attempt $i → $code"
            [[ "$code" == "200" ]] && exit 0
            sleep 10
          done
          echo "::error::Smoke test failed"
          exit 1

      - name: Notify Sentry release
        if: success() && secrets.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          npx --yes @sentry/cli releases new "$RELEASE_TAG"
          npx --yes @sentry/cli releases set-commits "$RELEASE_TAG" --auto
          npx --yes @sentry/cli releases finalize "$RELEASE_TAG"
          npx --yes @sentry/cli releases deploys "$RELEASE_TAG" new -e production
