services:
  postgres:
    image: postgres:16-alpine
    container_name: razum-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: razum
      POSTGRES_PASSWORD: razum_dev
      POSTGRES_DB: razum
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U razum -d razum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - razum-network

  redis:
    image: redis:7-alpine
    container_name: razum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - razum-network

volumes:
  pgdata:
  redisdata:

networks:
  razum-network:
    driver: bridge
